apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vcluster-{{ .Values.envName }}
  namespace: {{ .Values.argocdNamespace }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # Runs after the namespace (wave -1) is created and healthy.
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: {{ .Values.argocdProject }}
  source:
    repoURL: https://charts.loft.sh
    chart: vcluster
    targetRevision: {{ .Values.vclusterChartVersion }}
    helm:
      # Release name must match what wait_for_vcluster_kubeconfig expects:
      # it polls for secret "vc-<releaseName>" = "vc-vcluster-<envName>".
      releaseName: vcluster-{{ .Values.envName }}
  destination:
    server: https://kubernetes.default.svc
    namespace: env-{{ .Values.envName }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
