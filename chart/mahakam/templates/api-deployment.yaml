apiVersion: apps/v1
kind: Deployment
metadata:
  name: mahakam-api
  namespace: mahakam-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mahakam-api
  template:
    metadata:
      labels:
        app: mahakam-api
    spec:
      serviceAccountName: mahakam-api
      containers:
        - name: api
          image: "{{ .Values.api.image }}:{{ .Values.api.tag }}"
          imagePullPolicy: {{ .Values.api.imagePullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              value: "{{ .Values.api.databaseUrl }}"
            - name: WORKSPACES_BASE_PATH
              value: "{{ .Values.api.workspacesBasePath }}"
            - name: VIEWER_IMAGE
              value: "{{ .Values.api.viewerImage }}"
            - name: BROWSER_VIEWER_IMAGE
              value: "{{ .Values.api.browserViewerImage }}"
            - name: ANDROID_VIEWER_IMAGE
              value: "{{ .Values.api.androidViewerImage }}"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
