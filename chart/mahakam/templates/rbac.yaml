# CIFail: Human Review Required
# mahakam-api is a dev environment provisioner that installs vclusters (full K8s clusters).
# cluster-admin is intentional for a dev-only tool. Do NOT use this in production.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mahakam-api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: mahakam-api
    namespace: mahakam-system
