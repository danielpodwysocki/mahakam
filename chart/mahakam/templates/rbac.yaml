apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mahakam-api
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "get", "list", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mahakam-api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mahakam-api
subjects:
  - kind: ServiceAccount
    name: mahakam-api
    namespace: mahakam-system
