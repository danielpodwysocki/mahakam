apiVersion: apps/v1
kind: Deployment
metadata:
  name: mahakam-web
  namespace: mahakam-system
  labels:
    app: mahakam-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mahakam-web
  template:
    metadata:
      labels:
        app: mahakam-web
    spec:
      containers:
        - name: web
          image: mahakam-web
          ports:
            - containerPort: 3001
          env:
            - name: API_BASE_URL
              value: http://mahakam-api:3000
