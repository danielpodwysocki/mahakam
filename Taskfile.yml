version: '3'

tasks:
  default:
    silent: true
    cmds:
      - task --list

  project-init:
    desc: Initialize project by replacing rust-template with current directory name
    cmds:
      - rg -l rust-template | grep -v Taskfile.yml | xargs sed -i "s/rust-template/${PWD##*/}/g"

  build:
    desc: Build all binaries in release mode
    cmds:
      - cargo build --release
    sources:
      - crates/**/*.rs
      - Cargo.toml
      - Cargo.lock
    generates:
      - target/release/api

  run:
    desc: Run the API locally
    cmds:
      - cargo run --bin api
    deps: [test]

  cleanup:
    desc: Delete the Kind cluster
    cmds:
      - kind delete cluster --name danielpodwysocki

  cluster:
    desc: Create Kind cluster if it doesn't exist
    cmds:
      - (kind get clusters | grep danielpodwysocki) || kind create cluster --name danielpodwysocki --config=kind.yaml
      - kubectl config use-context kind-danielpodwysocki

  develop:
    desc: Start development environment with Skaffold
    cmds:
      - skaffold dev --port-forward=pods
    deps: [cluster, install-vcluster-operator]

  install:
    desc: Bootstrap Kind cluster with ArgoCD + mahakam via Helm
    cmds:
      - task: cluster
      - task: install-vcluster-operator
      - helm dependency update chart/mahakam
      - helm upgrade --install mahakam chart/mahakam --namespace mahakam-system --create-namespace --wait

  uninstall:
    desc: Remove mahakam Helm release
    cmds:
      - helm uninstall mahakam --namespace mahakam-system --ignore-not-found

  add-vcluster-repo:
    desc: Add vcluster Helm repository (run once)
    cmds:
      - helm repo add vcluster https://charts.loft.sh || true
      - helm repo update

  install-vcluster-operator:
    desc: Install the vCluster platform operator into the cluster (run once per cluster)
    cmds:
      - helm upgrade --install vcluster-platform vcluster-platform
          --repo https://charts.loft.sh
          --namespace vcluster-system
          --create-namespace
          --wait
    deps: [add-vcluster-repo]

  verify-all:
    desc: Run the full skaffold verify sequence
    cmds:
      - skaffold verify -a .skaffold-build.json
    deps: [verify-dependencies]

  verify-dependencies:
    desc: Prep dependencies for e2e testing
    cmds:
      - skaffold build --file-output .skaffold-build.json
      - skaffold deploy -a .skaffold-build.json --load-images=true
    deps: [cluster]

  cluster-down:
    desc: Stop and delete the Kind cluster
    cmds:
      - kind delete cluster --name danielpodwysocki

  test:
    desc: Run all tests (Rust + frontend)
    cmds:
      - cargo nextest run
      - npm --prefix frontends/web run test:unit

  coverage:
    desc: Enforce 100% line coverage on crates/shared/src/services (fails if any line uncovered)
    cmds:
      - cargo llvm-cov test
          --package shared
          --ignore-filename-regex 'repositories'
          --fail-under-lines 100

  coverage-frontend:
    desc: Enforce 100% coverage on frontend api/, composables/, components/, stores/
    cmds:
      - npm --prefix frontends/web run coverage

  lint:
    desc: Run clippy, check formatting, and typecheck frontend
    cmds:
      - cargo clippy -- -D warnings
      - cargo fmt --check
      - npm --prefix frontends/web run typecheck

  fmt:
    desc: Auto-format all code
    cmds:
      - cargo fmt

  docker-build:
    desc: Build container images locally
    cmds:
      - docker build -f images/api.containerfile -t mahakam-api:latest .
      - docker build -f images/web.containerfile -t mahakam-web:latest .
