apiVersion: batch/v1
kind: Job
metadata:
  name: repo-cloner
  namespace: placeholder
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: repo-cloner
          image: alpine/git:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Mahakam repo-cloner starting"
              echo "Environment: $ENV_NAME"
              echo "Repositories: $REPOS"
              echo "$REPOS" | tr -d '[]"' | tr ',' '\n' | while IFS= read -r repo; do
                repo=$(echo "$repo" | xargs)
                [ -n "$repo" ] && echo "Would clone: $repo"
              done
              echo "Done."
          envFrom:
            - configMapRef:
                name: env-config
