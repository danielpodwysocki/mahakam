apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: mahakam
build:
  artifacts:
    - image: mahakam-api
      docker:
        dockerfile: images/api.containerfile
    - image: mahakam-web
      docker:
        dockerfile: images/web.containerfile
    - image: mahakam-e2e
      docker:
        dockerfile: images/e2e.containerfile
manifests:
  kustomize:
    paths:
      - kube/
portForward:
  - resourceType: deployment
    resourceName: mahakam-api
    port: 3000
    localPort: 3000
  - resourceType: deployment
    resourceName: mahakam-web
    port: 3001
    localPort: 3001
verify:
  - name: e2e-api
    executionMode:
      kubernetesCluster: {}
    container:
      name: e2e-api
      image: mahakam-e2e
